upstream kong_backend {
    server 192.168.10.10:30000;
    keepalive 16;
}

# HTTP → HTTPS 重導向
server {
    listen 80;
    server_name test6.test;
    return 301 https://$host$request_uri;
}

# HTTPS 主設定（WebAuthn / Passkeys 需要 Secure Context）
server {
    listen 443 ssl;
    server_name test6.test;

    ssl_certificate     /etc/nginx/ssl/test6.test-cert.pem;
    ssl_certificate_key /etc/nginx/ssl/test6.test-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }

    # AI 端點：LLM 回應較慢，需要更長逾時
    # proxy_read_timeout 須 > Spring Boot ollama.read-timeout-seconds(270s)
    location /api/ai {
        proxy_pass http://kong_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_read_timeout 330s;
        proxy_send_timeout 330s;
    }

    location /api {
        proxy_pass http://kong_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    location /prometheus {
        proxy_pass http://kong_backend/prometheus;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /grafana {
        proxy_pass http://kong_backend/grafana;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
