# 伺服器配置
server.port=8080
server.servlet.context-path=/

# 應用程式資訊
spring.application.name=Spring Boot Demo

# Actuator & Prometheus 配置
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# Redis 配置（使用環境變數，Docker 部署時會自動替換）
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}
spring.redis.timeout=60000
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0
spring.redis.lettuce.pool.max-wait=-1ms

# ==============================================================
# 多資料庫配置範例
# ==============================================================

# MySQL 資料庫配置（使用環境變數，Docker 部署時會自動替換）
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://192.168.10.10:3306/spring_boot_demo?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Taipei&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
