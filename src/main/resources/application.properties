# H2 控制台配置（已停用，改用 SQLite）
spring.h2.console.enabled=false

# JPA 配置（MySQL）
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# MySQL 特定配置
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true
spring.jpa.properties.hibernate.connection.autocommit=false
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=true
# HikariCP 連線池配置（MySQL）
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.pool-name=MySQLPool

# 日誌配置（詳細設定見 logback-spring.xml）
logging.level.com.example.demo=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# JSON 配置
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.serialization.write-dates-as-timestamps=false

# 數據初始化配置
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# JWT 配置
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
# ==============================================================
# Ollama 本地 LLM 配置
# 架構：Spring Boot (VM) → localhost:11434 → Ollama 直接安裝於 VM
# 遷移腳本： bash /vagrant/scripts/setup/install-ollama-on-vm.sh
# 注：已從 K8s Pod 遷移至 VM 直接安裝，消除雙層虛擬化 overhead
# 預期速度： VM 直接 ~1-2 tok/s（vs K8s Pod 的 0.27 tok/s）
# ==============================================================
# 同步對話 - timeout: num_predict=20 丹 3.74s/tok ≈ 75s，270s 張余量
# Streaming 對話 - 第一個 token 約 15s 即可顯示（POST /api/ai/chat/stream）
# ==============================================================
# App 直接在 VM 上執行，用 localhost:11434 連到本機安裝的 Ollama
ollama.base-url=http://localhost:11434
ollama.model=qwen2.5:0.5b
ollama.connect-timeout-seconds=10
ollama.read-timeout-seconds=270

# ==============================================================
# WebAuthn / Passkeys 設定
# rpId 必須與前端瀏覽器訪問的網域相符
# 開發環境使用 localhost，生產環境改為正式網域（如 test6.test）
# ==============================================================
webauthn.rp.id=${WEBAUTHN_RP_ID:test6.test}
webauthn.rp.name=${WEBAUTHN_RP_NAME:Spring Boot Demo}

# ==============================================================
# Spring Profiles（多環境設定）
# dev    = 本地開發 VM MySQL（預設）
# test   = 單元/整合測試，H2 in-memory
# prod   = 生產環境，MySQL + validate
# 覆寫方式：設定環境變數 SPRING_PROFILES_ACTIVE=prod
# ==============================================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
