# ==================== TEST 環境設定 ====================
spring.config.activate.on-profile=test

# H2 in-memory 測試資料庫（MySQL 相容模式）
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA - 測試自動建表
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 console（test 環境方便 debug 查看資料）
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Flyway - 測試環境關閉（由 Hibernate create-drop 管理 schema）
spring.flyway.enabled=false

# Redis - 使用隨機 port 避免與 dev 衝突（由 EmbeddedRedisConfig 配置）
spring.redis.host=127.0.0.1
spring.redis.port=6370

# Mail - 測試環境停用
spring.mail.host=localhost
spring.mail.port=25
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# JWT
jwt.secret=testSecretKeyForJwtTokenGenerationWithEnoughLength12345678
jwt.expiration=86400000

# Scheduler - 測試環境關閉（避免排程任務干擾測試結果）
scheduling.enabled=false

# WebAuthn
webauthn.rp.id=localhost
webauthn.rp.name=Spring Boot Demo (Test)

# Logging - 測試環境只顯示必要日誌
logging.level.com.example.demo=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# Ollama - 測試環境停用（mock 處理）
ollama.base-url=http://localhost:11434
