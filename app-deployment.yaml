apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: app
  name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: app
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml
        kompose.version: 1.34.0 (cbf2835db)
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
      labels:
        io.kompose.service: app
    spec:
      # 讓所有 volume（包含 emptyDir）以 GID 1000 掛載，
      # 使 spring 使用者（GID 1000）可以寫入 /app/logs
      securityContext:
        fsGroup: 1000
      containers:
        - env:
            - name: JAVA_OPTS
              value: -Dspring.data.redis.host=redis -Dspring.data.redis.port=6379 -Dspring.redis.host=redis -Dspring.redis.port=6379
            - name: SERVER_PORT
              value: "8080"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: db-password
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/spring_boot_demo?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Taipei&allowPublicKeyRetrieval=true
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: db-username
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: jwt-secret
            - name: SPRING_DATA_REDIS_HOST
              value: redis
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: validate
            - name: SPRING_JPA_SHOW_SQL
              value: "true"
            - name: TZ
              value: Asia/Taipei
            - name: OLLAMA_BASE_URL
              value: http://192.168.10.10:11434
            - name: OLLAMA_MODEL
              value: qwen2.5:0.5b
          image: vagrant-app:latest
          imagePullPolicy: Never
          # 活體檢查
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30  # StartupProbe 成功後立即接管，無需額外等待
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          # 就緒檢查
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 5  # StartupProbe 成功後立即開始檢查
            periodSeconds: 10        # 檢查頻率加快，讓Pod更快變為Ready
            timeoutSeconds: 5
            failureThreshold: 3
          # 啟動探針
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30  # 應用一啟動就開始嘗試連接
            periodSeconds: 10        # 高頻率檢查，抓準啟動完成的那一刻
            timeoutSeconds: 5
            failureThreshold: 18    # 2s * 60 = 120s 總等待時間
          # 資源限制
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"     # 提高保證算力，加速啟動
            limits:
              memory: "1Gi"
              cpu: "1000m"
          name: spring-boot-app
          ports:
            - containerPort: 8080
              protocol: TCP
          volumeMounts:
            - mountPath: /app/logs
              name: app-logs
            - mountPath: /app/app.jar
              name: app-jar
              subPath: spring-boot-demo-0.0.1-SNAPSHOT.jar
      restartPolicy: Always
      volumes:
        - name: app-logs
          hostPath:
            path: /vagrant/logs
            type: DirectoryOrCreate
        - name: app-jar
          hostPath:
            path: /vagrant/target
            type: Directory
